version: '3.8'

services:
  pronax-ai:
    image: zkg786/pronax-ai:latest
    container_name: pronax-ai
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - PRONAX_MODEL=gemma-4-9b-it
      - PRONAX_PORT=8080
      - PRONAX_SPATIAL=true
    volumes:
      - pronax_models:/home/pronax/.pronax/models
      - pronax_logs:/app/logs
    restart: unless-stopped
    networks:
      - pronax-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: pronax-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - pronax-ai
    restart: unless-stopped
    networks:
      - pronax-network

volumes:
  pronax_models:
    driver: local
  pronax_logs:
    driver: local

networks:
  pronax-network:
    driver: bridge
