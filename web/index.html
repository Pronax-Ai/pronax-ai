<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProNax AI - 3D Spatial Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            min-height: 100vh;
        }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .neon-glow {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .typing-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00d4ff;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .message-bubble {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .spatial-visualization {
            position: relative;
            width: 60px;
            height: 60px;
            transform-style: preserve-3d;
            animation: rotate3d 10s infinite linear;
        }
        
        @keyframes rotate3d {
            from {
                transform: rotateX(0deg) rotateY(0deg);
            }
            to {
                transform: rotateX(360deg) rotateY(360deg);
            }
        }
        
        .spatial-cube {
            position: absolute;
            width: 20px;
            height: 20px;
            background: linear-gradient(45deg, #00d4ff, #00ff88);
            border: 1px solid rgba(255, 255, 255, 0.3);
            opacity: 0.8;
        }
    </style>
</head>
<body class="text-white">
    <!-- Header -->
    <header class="glass-morphism border-b border-gray-700">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="spatial-visualization">
                        <div class="spatial-cube" style="transform: translate3d(20px, 20px, 0);"></div>
                        <div class="spatial-cube" style="transform: translate3d(0, 20px, 20px);"></div>
                        <div class="spatial-cube" style="transform: translate3d(20px, 0, 20px);"></div>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold bg-gradient-to-r from-cyan-400 to-green-400 bg-clip-text text-transparent">
                            ProNax AI
                        </h1>
                        <p class="text-xs text-gray-400">3D Spatial Intelligence Engine</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2">
                        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                        <span class="text-sm text-gray-300">Online</span>
                    </div>
                    <button id="settingsBtn" class="p-2 hover:bg-gray-700 rounded-lg transition">
                        <i class="fas fa-cog"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Chat Interface -->
    <main class="container mx-auto px-4 py-6 max-w-4xl">
        <!-- Chat Messages -->
        <div id="chatMessages" class="glass-morphism rounded-xl p-6 mb-6 h-96 overflow-y-auto space-y-4">
            <div class="text-center text-gray-400 py-8">
                <i class="fas fa-robot text-4xl mb-4 text-cyan-400"></i>
                <p>Welcome to ProNax AI</p>
                <p class="text-sm">Powered by 3D Spatial Intelligence</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="glass-morphism rounded-xl p-4">
            <div class="flex items-end space-x-4">
                <div class="flex-1">
                    <textarea 
                        id="messageInput"
                        placeholder="Ask me anything... Try spatial reasoning, code generation, or creative tasks!"
                        class="w-full bg-transparent border border-gray-600 rounded-lg px-4 py-3 resize-none focus:outline-none focus:border-cyan-400 transition"
                        rows="3"
                    ></textarea>
                </div>
                <button 
                    id="sendBtn"
                    class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-green-500 rounded-lg font-semibold hover:from-cyan-600 hover:to-green-600 transition neon-glow"
                >
                    <i class="fas fa-paper-plane mr-2"></i>
                    Send
                </button>
            </div>
            
            <!-- Quick Actions -->
            <div class="flex flex-wrap gap-2 mt-4">
                <button class="quick-action px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded-full text-sm transition">
                    <i class="fas fa-code mr-1"></i> Generate Code
                </button>
                <button class="quick-action px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded-full text-sm transition">
                    <i class="fas fa-brain mr-1"></i> Spatial Reasoning
                </button>
                <button class="quick-action px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded-full text-sm transition">
                    <i class="fas fa-lightbulb mr-1"></i> Creative Writing
                </button>
                <button class="quick-action px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded-full text-sm transition">
                    <i class="fas fa-chart-line mr-1"></i> Analysis
                </button>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="mt-4 flex items-center justify-between text-sm text-gray-400">
            <div class="flex items-center space-x-4">
                <span>Model: <span class="text-cyan-400">Gemma-4-9B-IT</span></span>
                <span>Spatial: <span class="text-green-400">Enabled</span></span>
            </div>
            <div id="statusText" class="flex items-center space-x-2">
                <i class="fas fa-info-circle"></i>
                <span>Ready</span>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="glass-morphism rounded-xl p-6 max-w-md w-full mx-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold">Settings</h2>
                <button id="closeSettings" class="text-gray-400 hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Temperature</label>
                    <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7" class="w-full">
                    <span id="tempValue" class="text-sm text-gray-400">0.7</span>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Max Tokens</label>
                    <input type="number" id="maxTokens" value="1024" min="1" max="4096" class="w-full bg-gray-700 rounded px-3 py-2">
                </div>
                
                <div>
                    <label class="flex items-center space-x-2">
                        <input type="checkbox" id="spatialMode" checked class="rounded">
                        <span>Enable 3D Spatial Processing</span>
                    </label>
                </div>
            </div>
            
            <button id="saveSettings" class="w-full mt-6 px-4 py-2 bg-gradient-to-r from-cyan-500 to-green-500 rounded-lg font-semibold hover:from-cyan-600 hover:to-green-600 transition">
                Save Settings
            </button>
        </div>
    </div>

    <script>
        class ProNaxChat {
            constructor() {
                this.apiUrl = 'https://your-domain.com/api/v1/chat/completions';
                this.apiKey = 'pronax-key';
                this.settings = {
                    temperature: 0.7,
                    maxTokens: 1024,
                    spatialMode: true
                };
                
                this.initElements();
                this.initEventListeners();
                this.loadSettings();
            }
            
            initElements() {
                this.chatMessages = document.getElementById('chatMessages');
                this.messageInput = document.getElementById('messageInput');
                this.sendBtn = document.getElementById('sendBtn');
                this.settingsBtn = document.getElementById('settingsBtn');
                this.settingsModal = document.getElementById('settingsModal');
                this.closeSettings = document.getElementById('closeSettings');
                this.saveSettings = document.getElementById('saveSettings');
                this.statusText = document.getElementById('statusText');
                this.temperature = document.getElementById('temperature');
                this.tempValue = document.getElementById('tempValue');
                this.maxTokens = document.getElementById('maxTokens');
                this.spatialMode = document.getElementById('spatialMode');
            }
            
            initEventListeners() {
                this.sendBtn.addEventListener('click', () => this.sendMessage());
                this.messageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                });
                
                this.settingsBtn.addEventListener('click', () => {
                    this.settingsModal.classList.remove('hidden');
                });
                
                this.closeSettings.addEventListener('click', () => {
                    this.settingsModal.classList.add('hidden');
                });
                
                this.saveSettings.addEventListener('click', () => {
                    this.saveSettingsToStorage();
                    this.settingsModal.classList.add('hidden');
                });
                
                this.temperature.addEventListener('input', (e) => {
                    this.tempValue.textContent = e.target.value;
                });
                
                // Quick actions
                document.querySelectorAll('.quick-action').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const action = e.currentTarget.textContent.trim();
                        this.handleQuickAction(action);
                    });
                });
            }
            
            handleQuickAction(action) {
                const prompts = {
                    'Generate Code': 'Write a Rust function that implements 3D spatial coordinates transformation.',
                    'Spatial Reasoning': 'Explain how 3D spatial attention mechanisms improve neural network performance.',
                    'Creative Writing': 'Write a short story about an AI that discovers 3D spatial consciousness.',
                    'Analysis': 'Analyze the computational complexity of traditional 2D vs 3D spatial attention.'
                };
                
                this.messageInput.value = prompts[action] || '';
                this.messageInput.focus();
            }
            
            async sendMessage() {
                const message = this.messageInput.value.trim();
                if (!message) return;
                
                // Add user message
                this.addMessage(message, 'user');
                this.messageInput.value = '';
                
                // Show typing indicator
                this.showTypingIndicator();
                this.updateStatus('Thinking...');
                
                try {
                    const response = await fetch(this.apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.apiKey}`
                        },
                        body: JSON.stringify({
                            model: 'gemma-4',
                            messages: [
                                { role: 'system', content: 'You are ProNax AI, a 3D spatial intelligence engine. Provide responses with spatial awareness when relevant.' },
                                { role: 'user', content: message }
                            ],
                            temperature: this.settings.temperature,
                            max_tokens: this.settings.maxTokens,
                            stream: false
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    const aiResponse = data.choices[0].message.content;
                    
                    this.removeTypingIndicator();
                    this.addMessage(aiResponse, 'ai');
                    this.updateStatus('Ready');
                    
                } catch (error) {
                    this.removeTypingIndicator();
                    this.addMessage('Sorry, I encountered an error. Please try again.', 'error');
                    this.updateStatus('Error');
                    console.error('API Error:', error);
                }
            }
            
            addMessage(content, type) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message-bubble flex ${type === 'user' ? 'justify-end' : 'justify-start'}`;
                
                const bubbleClass = type === 'user' 
                    ? 'bg-gradient-to-r from-cyan-500 to-blue-500' 
                    : type === 'error'
                    ? 'bg-red-500'
                    : 'bg-gray-700';
                
                messageDiv.innerHTML = `
                    <div class="max-w-xs lg:max-w-md">
                        <div class="${bubbleClass} rounded-lg px-4 py-2">
                            <p class="text-sm">${content}</p>
                        </div>
                        <p class="text-xs text-gray-400 mt-1 ${type === 'user' ? 'text-right' : ''}">
                            ${new Date().toLocaleTimeString()}
                        </p>
                    </div>
                `;
                
                this.chatMessages.appendChild(messageDiv);
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }
            
            showTypingIndicator() {
                const typingDiv = document.createElement('div');
                typingDiv.id = 'typingIndicator';
                typingDiv.className = 'flex justify-start';
                typingDiv.innerHTML = `
                    <div class="bg-gray-700 rounded-lg px-4 py-2">
                        <div class="typing-indicator">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                `;
                this.chatMessages.appendChild(typingDiv);
                this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
            }
            
            removeTypingIndicator() {
                const indicator = document.getElementById('typingIndicator');
                if (indicator) {
                    indicator.remove();
                }
            }
            
            updateStatus(text) {
                this.statusText.innerHTML = `
                    <i class="fas fa-${text === 'Ready' ? 'check-circle' : text === 'Thinking...' ? 'spinner fa-spin' : 'exclamation-triangle'}"></i>
                    <span>${text}</span>
                `;
            }
            
            saveSettingsToStorage() {
                this.settings.temperature = parseFloat(this.temperature.value);
                this.settings.maxTokens = parseInt(this.maxTokens.value);
                this.settings.spatialMode = this.spatialMode.checked;
                
                localStorage.setItem('pronax-settings', JSON.stringify(this.settings));
            }
            
            loadSettings() {
                const saved = localStorage.getItem('pronax-settings');
                if (saved) {
                    this.settings = JSON.parse(saved);
                    this.temperature.value = this.settings.temperature;
                    this.tempValue.textContent = this.settings.temperature;
                    this.maxTokens.value = this.settings.maxTokens;
                    this.spatialMode.checked = this.settings.spatialMode;
                }
            }
        }
        
        // Initialize chat when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new ProNaxChat();
        });
    </script>
</body>
</html>
